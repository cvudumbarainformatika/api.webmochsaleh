version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-webrsud-app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor # Jangan timpa vendor dari image
      - /var/www/html/bootstrap/cache # Jangan timpa cache dari image
      - ./docker/php/opcache.ini:/usr/local/etc/php/conf.d/opcache.ini
      - ./storage:/var/www/html/storage
    networks:
      - rsud-network

  web:
    image: nginx:alpine
    container_name: api-webrsud-web
    restart: unless-stopped
    ports:
      - "8123:80"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor # Tambahkan juga di sisi web agar rute terbaca
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./storage:/var/www/html/storage
    networks:
      - rsud-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: api-webrsud-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: udumbara_rsud
      MYSQL_USER: admin
      MYSQL_PASSWORD: sasa0102
      MYSQL_ROOT_PASSWORD: sasa0102
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - rsud-network

networks:
  rsud-network:
    name: rsud-network
    driver: bridge

volumes:
  db_data:
